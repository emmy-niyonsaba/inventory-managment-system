<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Airtel Inventory - Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }
        .nav-links {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .nav-links a {
            margin-right: 20px;
            text-decoration: none;
            color: #667eea;
            padding: 8px 15px;
            border-radius: 5px;
        }
        .nav-links a:hover {
            background: #667eea;
            color: white;
        }
        .logout-btn {
            background: #e74c3c;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Airtel Inventory Management System</h1>
        <p>Welcome, <span th:text="${currentUser != null ? currentUser.fullName : 'User'}"></span>!</p>
        <a href="/logout" class="logout-btn">Logout</a>
    </div>
    
    <div class="nav-links">
        <a href="/dashboard">Dashboard</a>
        <a href="/equipment">Equipment</a>
        <a href="/assignments">Assignments</a>
        <a href="/reports">Reports</a>
    </div>
    
    <div class="stats">
        <div class="stat-card">
            <div class="stat-number" th:text="${totalEquipment != null ? totalEquipment : 0}">0</div>
            <div>Total Equipment</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" th:text="${availableEquipment != null ? availableEquipment : 0}">0</div>
            <div>Available</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" th:text="${assignedEquipment != null ? assignedEquipment : 0}">0</div>
            <div>Assigned</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" th:text="${activeAssignments != null ? activeAssignments : 0}">0</div>
            <div>Active Assignments</div>
        </div>
    </div>
    
    <div style="background: white; padding: 20px; border-radius: 10px;">
        <h3>Quick Actions</h3>
        <a href="/equipment/add" style="background: #667eea; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block; margin-right: 10px;">Add Equipment</a>
        <a href="/assignments" style="background: #48bb78; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block;">View Assignments</a>
    </div>
</body>
</html>

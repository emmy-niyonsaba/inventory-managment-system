<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${reportTitle}">Report</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; }
        h1 { color: #667eea; text-align: center; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; border-bottom: 1px solid #ddd; padding-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #667eea; color: white; }
        .footer { margin-top: 30px; text-align: center; font-size: 12px; color: #999; }
        .btn { display: inline-block; padding: 10px 20px; background: #667eea; color: white; text-decoration: none; border-radius: 5px; margin-top: 20px; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>
    <div class="no-print" style="text-align: right; margin-bottom: 20px;">
        <button onclick="window.print()" style="padding: 8px 15px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer;">🖨️ Print Report</button>
        <a href="/reports" style="margin-left: 10px; padding: 8px 15px; background: #a0aec0; color: white; text-decoration: none; border-radius: 5px;">← Back</a>
    </div>
    
    <h1 th:text="${reportTitle}"></h1>
    <div class="subtitle">Generated on: <span th:text="${#dates.format(#dates.createNow(), 'dd-MM-yyyy HH:mm:ss')}"></span><br>
    Generated by: <span th:text="${currentUser.fullName}"></span></div>
    
    <div th:if="${equipmentList != null}">
        <table>
            <thead>
                <tr><th>Asset Tag</th><th>Device Type</th><th>Brand</th><th>Model</th><th>Serial Number</th><th>Status</th><th>Current Owner</th><th>Condition</th></tr>
            </thead>
            <tbody>
                <tr th:each="eq : ${equipmentList}">
                    <td th:text="${eq.assetTag}"></td>
                    <td th:text="${eq.deviceType}"></td>
                    <td th:text="${eq.brand}"></td>
                    <td th:text="${eq.model}"></td>
                    <td th:text="${eq.serialNumber}"></td>
                    <td th:text="${eq.status.displayName}"></td>
                    <td th:text="${eq.currentOwner != null ? eq.currentOwner : '-'}"></td>
                    <td th:text="${eq.condition != null ? eq.condition : '-'}"></td>
                </tr>
            </tbody>
        </table>
    </div>
    
    <div th:if="${assignments != null}">
        <table>
            <thead>
                <tr><th>Asset Tag</th><th>Equipment</th><th>Assigned To</th><th>Department</th><th>Assigned Date</th><th>Expected Return</th><th>Actual Return</th><th>Status</th></tr>
            </thead>
            <tbody>
                <tr th:each="a : ${assignments}">
                    <td th:text="${a.equipment.assetTag}"></td>
                    <td th:text="${a.equipment.brand} + ' ' + ${a.equipment.model}"></td>
                    <td th:text="${a.assignedUser.fullName}"></td>
                    <td th:text="${a.assignedToDepartment}"></td>
                    <td th:text="${#dates.format(a.assignedDate, 'dd-MM-yyyy')}"></td>
                    <td th:text="${#dates.format(a.expectedReturnDate, 'dd-MM-yyyy')}"></td>
                    <td th:text="${a.actualReturnDate != null ? #dates.format(a.actualReturnDate, 'dd-MM-yyyy') : '-'}"></td>
                    <td th:text="${a.status}"></td>
                </tr>
            </tbody>
        </table>
    </div>
    
    <div class="footer">
        <p>This is a system-generated report from Airtel Inventory Management System</p>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airtel Inventory - User Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
        }
        
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .logout-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 8px 15px;
            text-decoration: none;
            border-radius: 5px;
        }
        
        .container {
            display: flex;
        }
        
        .sidebar {
            width: 250px;
            background: white;
            height: calc(100vh - 60px);
        }
        
        .sidebar-menu {
            list-style: none;
            padding: 20px 0;
        }
        
        .sidebar-menu li {
            padding: 12px 25px;
        }
        
        .sidebar-menu li a {
            text-decoration: none;
            color: #333;
        }
        
        .sidebar-menu li.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .sidebar-menu li.active a {
            color: white;
        }
        
        .main-content {
            flex: 1;
            padding: 30px;
        }
        
        .form-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            max-width: 600px;
        }
        
        .form-title {
            margin-bottom: 25px;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }
        
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-secondary {
            background: #a0aec0;
            color: white;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .required:after {
            content: " *";
            color: red;
        }
        
        .info-text {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h2>🏢 Airtel Inventory Management System</h2>
        <div class="user-info">
            <span th:text="${currentUser.fullName}"></span>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>
    </div>
    
    <div class="container">
        <div class="sidebar">
            <ul class="sidebar-menu">
                <li><a href="/dashboard">🏠 Dashboard</a></li>
                <li><a href="/equipment">📱 Equipment</a></li>
                <li><a href="/assignments">📋 Assignments</a></li>
                <li><a href="/reports">📊 Reports</a></li>
                <li class="active"><a href="/users">👥 Users</a></li>
            </ul>
        </div>
        
        <div class="main-content">
            <div class="form-container">
                <h2 class="form-title">Add New User</h2>
                
                <form action="/users/add" method="post">
                    <div class="form-group">
                        <label class="required">Username</label>
                        <input type="text" name="username" required placeholder="Enter username">
                        <div class="info-text">Username must be unique</div>
                    </div>
                    
                    <div class="form-group">
                        <label class="required">Password</label>
                        <input type="password" name="password" required placeholder="Enter password">
                        <div class="info-text">Minimum 6 characters</div>
                    </div>
                    
                    <div class="form-group">
                        <label class="required">Full Name</label>
                        <input type="text" name="fullName" required placeholder="Enter full name">
                    </div>
                    
                    <div class="form-group">
                        <label>Department</label>
                        <input type="text" name="department" placeholder="e.g., IT, HR, Sales">
                    </div>
                    
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" placeholder="user@airtel.com">
                    </div>
                    
                    <div class="form-group">
                        <label>Role</label>
                        <select name="role">
                            <option value="USER">User</option>
                            <option value="MANAGER">Manager</option>
                            <option value="ADMIN">Admin</option>
                        </select>
                    </div>
                    
                    <div class="btn-group">
                        <button type="submit" class="btn btn-primary">Create User</button>
                        <a href="/users" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
